name: Chrono - Supabase

# Deploys the Postgres schema (migrations under backend/supabase/migrations) to
# the linked hosted Supabase project. Mirrors the Aesthemedstaff workflow, minus
# edge functions (Chrono has none — push dispatch is a pg_net trigger).
#
# Requires, on the `Production - Supabase` environment:
#   secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD
#   vars:    SUPABASE_PROJECT_ID   (the hosted project ref)

on:
  push:
    branches:
      - master
    paths:
      - backend/supabase/**
  pull_request:
    paths:
      - backend/supabase/**

jobs:
  deploy:
    # Run only on push; on PRs the workflow still reports a check but skips the deploy.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Production - Supabase

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to project
        run: supabase --workdir backend/supabase link --project-ref $PROJECT_ID

      - name: Push migrations
        run: supabase --workdir backend/supabase db push
